<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;

            width: 400px;

            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        button {
            width: 100%;
            padding: 10px;

            background-color: #28a745;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        p {
            text-align: center;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>User Registration</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
