<!DOCTYPE html>
<html>
<head>
    <title>Edit Blog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;

            width: 600px;

            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        button {
            width: 100%;
            padding: 10px;

            background-color: #007bff;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }

        .back {
            margin-top: 15px;
            text-align: center;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Edit Blog</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Update Blog
        </button>

    </form>

    <div class="back">
        <a href="/">← Back to Home</a>
    </div>

</div>

</body>
</html>
